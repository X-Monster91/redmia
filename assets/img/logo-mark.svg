<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="REDMIA">
  <!-- Símbolo: nodos conectados formando una "R" abstracta (red + IA) -->
  <defs>
    <linearGradient id="rm-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A44"/>
      <stop offset="100%" stop-color="#2A4768"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="200" height="200" rx="44" fill="url(#rm-grad)"/>
  <!-- Glow áureo sutil -->
  <circle cx="140" cy="60" r="40" fill="#C8924A" opacity="0.18"/>
  <!-- Conexiones (aristas de la red) -->
  <g stroke="#C8924A" stroke-width="3" opacity="0.85" stroke-linecap="round">
    <line x1="62" y1="58" x2="128" y2="58"/>
    <line x1="128" y1="58" x2="128" y2="100"/>
    <line x1="128" y1="100" x2="62" y2="100"/>
    <line x1="62" y1="100" x2="128" y2="142"/>
    <line x1="62" y1="100" x2="62" y2="58"/>
    <line x1="128" y1="100" x2="128" y2="142"/>
  </g>
  <!-- Nodos (vértices) -->
  <g fill="#FBF8F3">
    <circle cx="62" cy="58" r="11"/>
    <circle cx="128" cy="58" r="11"/>
    <circle cx="62" cy="100" r="13" fill="#C8924A"/>
    <circle cx="128" cy="100" r="11"/>
    <circle cx="128" cy="142" r="11"/>
  </g>
  <!-- Puntos internos de los nodos (detalle IA) -->
  <g fill="#0F2A44">
    <circle cx="62" cy="58" r="4"/>
    <circle cx="128" cy="58" r="4"/>
    <circle cx="128" cy="100" r="4"/>
    <circle cx="128" cy="142" r="4"/>
  </g>
</svg>
