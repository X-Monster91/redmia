<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración — REDMIA</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/pages.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="container header__container">
      <a href="index.html" class="header__logo">
        <img src="assets/img/logo-mark.svg" alt="REDMIA Logo">
        <span class="header__logo-text">REDMIA</span>
      </a>
      <nav class="header__nav" id="mainNav">
        <a href="index.html" class="header__nav-link">Inicio</a>
        <a href="quienes-somos.html" class="header__nav-link">Quiénes somos</a>
        <a href="membresias.html" class="header__nav-link">Membresías</a>
        <a href="publicaciones.html" class="header__nav-link">Publicaciones</a>
        <a href="eventos.html" class="header__nav-link">Eventos</a>
        <a href="contacto.html" class="header__nav-link">Contacto</a>
      </nav>
      <div class="header__actions">
        <a href="admin.html" class="btn btn--primary btn--sm">Admin</a>
        <a href="#" id="logoutBtn" class="btn btn--secondary btn--sm">Cerrar Sesión</a>
      </div>
      <button class="header__menu-btn" id="menuBtn" aria-label="Abrir menú">
        <svg class="header__menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12h18M3 6h18M3 18h18"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Admin Panel -->
  <section class="section">
    <div class="container">
      <h2>Panel de Administración</h2>
      <p class="text-muted mb-8" id="welcomeMsg">Bienvenido</p>

      <!-- Stats -->
      <div id="adminStats" class="grid grid--3 mb-8">
        <div class="stat-card">
          <div class="stat-card__label">Pendientes</div>
          <div class="stat-card__value">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Aprobados</div>
          <div class="stat-card__value">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__label">Miembros Activos</div>
          <div class="stat-card__value">—</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="flex gap-4 mb-6">
        <button class="btn btn--primary btn--sm" onclick="loadSolicitudes('pendiente')">Pendientes</button>
        <button class="btn btn--secondary btn--sm" onclick="loadSolicitudes('aprobado')">Aprobados</button>
        <button class="btn btn--secondary btn--sm" onclick="loadSolicitudes('rechazado')">Rechazados</button>
      </div>

      <!-- Pending Requests -->
      <div class="card mb-8">
        <div class="card__body">
          <h3 class="mb-6">Solicitudes</h3>
          <div id="pendingRequests">
            <p class="text-muted">Cargando solicitudes...</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">
        <p class="footer__copyright">&copy; 2024 REDMIA. Todos los derechos reservados.</p>
        <div class="footer__legal">
          <a href="aviso-privacidad.html" class="footer__legal-link">Aviso de Privacidad</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
